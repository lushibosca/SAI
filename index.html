<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; upgrade-insecure-requests;">
    <meta name="referrer" content="no-referrer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="./flash.js"></script>
    <link rel="stylesheet" href="./styles.css">
    <link rel="manifest" href="./manifest.json">
    <script src="./app.js" defer></script>
    <title>REI launcher | Inicio</title>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" class="svg-sprites" width="0" height="0">
        <defs>
            <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
            </symbol>
            <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </symbol>
            <symbol id="icon-install" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
                <polyline points="9 10 12 13 15 10"></polyline>
                <line x1="12" y1="6" x2="12" y2="13"></line>
            </symbol>
            <symbol id="icon-box" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14" />
                <polyline points="3.29 7 12 12 20.71 7" />
                <line x1="12" y1="22" x2="12" y2="12" />
            </symbol>
            <symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                <circle cx="12" cy="13" r="3" />
            </symbol>
            <symbol id="icon-id" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="16" rx="3" ry="3" />
                <circle cx="9" cy="10" r="2" />
                <line x1="15" y1="8" x2="17" y2="8" />
                <line x1="15" y1="12" x2="17" y2="12" />
                <line x1="7" y1="16" x2="17" y2="16" />
            </symbol>
        </defs>
    </svg>

    <header class="header">
        <div class="header-logo">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
        </div>
        <h1 class="header-main-title">REI</h1>
        <div class="header-actions">
            <button class="icon-btn" id="btn-install-app" title="Instalar Aplicación">
                <svg class="svg-icon">
                    <use href="#icon-install" />
                </svg>
            </button>
            <button class="icon-btn" id="btn-dark-mode" title="Alternar modo oscuro" aria-label="Modo oscuro">
                <svg class="svg-icon">
                    <use id="icon-theme-use" href="#icon-moon" />
                </svg>
            </button>
        </div>
    </header>

    <main class="container">


        <div class="app-grid">
            <a href="./SGI/index.html" class="app-card" rel="noopener noreferrer">
                <div class="app-icon-wrapper color-blue">
                    <svg class="app-icon">
                        <use href="#icon-box" />
                    </svg>
                </div>
                <div class="app-info">
                    <h3>Materiales</h3>
                    <p>Gestión de Entradas y salidas de materiales y herramientas.</p>
                </div>
            </a>

            <a href="./SGC/index.html" class="app-card" rel="noopener noreferrer">
                <div class="app-icon-wrapper color-green">
                    <svg class="app-icon">
                        <use href="#icon-camera" />
                    </svg>
                </div>
                <div class="app-info">
                    <h3>CCTV</h3>
                    <p>Registro de dispositivos de camaras y grabadores.</p>
                </div>
            </a>

            <a href="./SGL/index.html" class="app-card" rel="noopener noreferrer">
                <div class="app-icon-wrapper color-purple">
                    <svg class="app-icon">
                        <use href="#icon-id" />
                    </svg>
                </div>
                <div class="app-info">
                    <h3>Licencias</h3>
                    <p>Registro de licencias de personas</p>
                </div>
            </a>
        </div>
    </main>
</body>

</html>
